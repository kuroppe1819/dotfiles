format = """
$directory$git_branch$git_commit$git_state$git_status$cmd_duration
$character"""

add_newline = true
command_timeout = 5000
continuation_prompt = "▶▶ "

[character]
success_symbol = "[❯](bold #c3e88d)"
error_symbol = "[❯](bold #ff757f)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true
style = "bold #77e0f3"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$symbol$branch]($style) "
symbol = ""
style = "bold #c099ff"

[git_commit]
commit_hash_length = 7
style = "bold #7a88cf"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
ahead = "⇡${count}"
behind = "⇣${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
deleted = "✘"
stashed = "S${count}"
style = "bold #ff966c"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold #ffc777"

[package]
disabled = true
